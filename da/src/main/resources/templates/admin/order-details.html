<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Chi tiết đơn hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h3>Chi tiết đơn hàng #<span th:text="${order.id}"></span></h3>
    
    <div class="row">
        <div class="col-md-4">
            <div class="card p-3 mb-3">
                <h5>Thông tin khách hàng</h5>
                <p><b>Tên:</b> <span th:text="${order.customerName}"></span></p>
                <p><b>SĐT:</b> <span th:text="${order.mobileNumber}"></span></p>
                <p><b>Địa chỉ:</b> <span th:text="${order.address}"></span></p>
                <p><b>Ngày đặt:</b> <span th:text="${order.orderDate}"></span></p>
            </div>

			<div class="card p-3">
			    <h5>Cập nhật trạng thái</h5>

			    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
			        <i class="fas fa-check-circle me-2"></i>
			        <span th:text="${success}"></span>
			        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
			    </div>

			    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
			        <i class="fas fa-exclamation-triangle me-2"></i>
			        <span th:text="${error}"></span>
			        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
			    </div>

			    <form action="/admin/orders/update-status" method="post">
			        <input type="hidden" name="id" th:value="${order.id}">
			        
			        <select name="status" class="form-select mb-3" 
			                th:disabled="${order.orderStatus == 'CANCELLED' or order.orderStatus == 'DELIVERED'}">
			            <option value="PENDING" th:selected="${order.orderStatus == 'PENDING'}">Chờ xử lý</option>
			            <option value="SHIPPED" th:selected="${order.orderStatus == 'SHIPPED'}">Đang giao</option>
			            <option value="DELIVERED" th:selected="${order.orderStatus == 'DELIVERED'}">Đã giao hàng</option>
			            <option value="CANCELLED" th:selected="${order.orderStatus == 'CANCELLED'}">Hủy đơn</option>
			        </select>

			        <button type="submit" class="btn btn-primary w-100" 
			                th:if="${order.orderStatus != 'CANCELLED' and order.orderStatus != 'DELIVERED'}">
			            Cập nhật trạng thái
			        </button>
			    </form>
			</div>
        </div>

        <div class="col-md-8">
            <table class="table table-bordered">
                <thead class="table-secondary">
                <tr>
                    <th>Sản phẩm</th>
                    <th>Hình ảnh</th>
                    <th>Giá lúc mua</th>
                    <th>Số lượng</th>
                    <th>Thành tiền</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="d : ${details}">
                    <td th:text="${d.productName}"></td>
                    <					<td>
					    <img th:src="${d.product != null and d.product.image != null and d.product.image.startsWith('http') ? 
					                  d.product.image : '/product-images/' + (d.product != null and d.product.image != null ? d.product.image : 'no-image.png')}" 
					         style="width: 60px; height: 60px; object-fit: contain;"
					         onerror="this.src='https://via.placeholder.com/60?text=Err'">
					</td>
                    <td th:text="${d.price != null ? #numbers.formatDecimal(d.price, 0, 'POINT', 0, 'COMMA') + ' đ' : '0 đ'}"></td>
                    <td th:text="${d.quantity}"></td>
                   	<td th:text="${#numbers.formatDecimal(d.price * d.quantity, 0, 'POINT', 0, 'COMMA')} + ' đ'"></td>
                </tr>
                </tbody>
            </table>
			<h4 class="text-end text-danger">
			    Tổng tiền: 
			    <span th:if="${order.productTotalPrice != null}"
			          th:with="total=${T(java.lang.Double).parseDouble(order.productTotalPrice)}"
			          th:text="${#numbers.formatDecimal(total, 0, 'POINT', 0, 'COMMA')} + ' đ'">
			    </span>
			    <span th:unless="${order.productTotalPrice != null}">0 đ</span>
			</h4>
        </div>
    </div>
    
    <a href="/admin/orders" class="btn btn-secondary mt-3">Quay lại danh sách</a>
</div>
</body>

</html>
