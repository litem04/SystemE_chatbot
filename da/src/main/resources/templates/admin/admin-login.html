<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #222; color: white; }</style>
</head>
<body>
<div class="container mt-5 w-50">
    <h3 class="text-center text-danger">TRANG QUẢN TRỊ VIÊN</h3>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form action="/admin/login" method="post" class="bg-dark p-4 rounded">
        <div class="mb-3">
            <label>Email Admin:</label>
            <input type="email" name="email" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Mật khẩu:</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-danger w-100">Vào Dashboard</button>
    </form>
</div>
</body>
</html>
