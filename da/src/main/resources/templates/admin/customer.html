<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quản lý Khách hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* CSS tùy chỉnh nhỏ để giao diện mượt hơn */
        body {
            background-color: #f8f9fa;
            overflow-x: hidden; /* Chặn thanh cuộn ngang thừa */
        }
        .main-content {
            margin-left: 250px; /* Chừa chỗ cho Sidebar bên trái */
            padding: 20px;
            transition: all 0.3s;
        }
        /* Nếu màn hình nhỏ (Mobile) thì bỏ margin để full màn hình */
        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
            }
        }
        .avatar-circle {
            width: 45px;
            height: 45px;
            background-color: #0d6efd; /* Màu xanh Primary */
            color: white;
            font-weight: bold;
            font-size: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="main-content">
        
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
            
            <div class="d-flex align-items-center">
                <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary me-3" title="Quay lại Dashboard">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <div>
                    <h2 class="fw-bold mb-0 text-dark">Khách hàng</h2>
                    <p class="text-muted mb-0 small">Quản lý thông tin người dùng</p>
                </div>
            </div>

            <form action="/admin/customers" method="get" class="d-flex shadow-sm" style="max-width: 400px; flex-grow: 1;">
                <input class="form-control border-0 rounded-start" type="search" name="keyword" 
                       th:value="${keyword}" placeholder="Tìm tên, email, sđt...">
                <button class="btn btn-primary rounded-end px-4" type="submit">
                    <i class="fas fa-search"></i>
                </button>
            </form>
        </div>

        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
            <i class="fas fa-check-circle me-2"></i><span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i><span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card shadow border-0 rounded-4 overflow-hidden">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light text-secondary text-uppercase small fw-bold">
                            <tr>
                                <th class="py-3 ps-4">Khách hàng</th>
                                <th class="py-3">Liên hệ</th>
                                <th class="py-3">Địa chỉ</th>
                                <th class="py-3 text-center" style="width: 150px;">Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="customer : ${customers}">
                                <td class="ps-4">
                                    <div class="d-flex align-items-center">
                                        <div class="avatar-circle me-3">
                                            <span th:text="${#strings.substring(customer.name, 0, 1)}">A</span>
                                        </div>
                                        <div>
                                            <h6 class="mb-0 fw-bold text-dark" th:text="${customer.name}">Tên Khách</h6>
                                            <small class="text-muted">ID: #<span th:text="${customer.id}">1</span></small>
                                        </div>
                                    </div>
                                </td>
                                
                                <td>
                                    <div class="d-flex flex-column">
                                        <span class="mb-1 text-dark" th:if="${customer.email}">
                                            <i class="fas fa-envelope text-muted me-2 width-20"></i>[[${customer.email}]]
                                        </span>
                                        <span class="text-dark" th:if="${customer.phone}">
                                            <i class="fas fa-phone text-muted me-2 width-20"></i>[[${customer.phone}]]
                                        </span>
                                    </div>
                                </td>
                                
                                <td>
                                    <span class="d-inline-block text-truncate text-secondary" style="max-width: 200px;" 
                                          th:text="${customer.address != null ? customer.address : '---'}">
                                        Địa chỉ
                                    </span>
                                </td>
                                
                                <td class="text-center">
                                    <a th:href="@{/admin/customers/delete/{id}(id=${customer.id})}" 
                                       class="btn btn-sm btn-outline-danger rounded-pill px-3"
                                       title="Xóa khách hàng"
                                       onclick="return confirm('CẢNH BÁO: Xóa khách hàng này sẽ xóa lịch sử mua hàng?');">
                                        <i class="fas fa-trash-alt me-1"></i> Xóa
                                    </a>
                                </td>
                            </tr>

                            <tr th:if="${customers.isEmpty()}">
                                <td colspan="4" class="text-center py-5">
                                    <div class="text-muted">
                                        <i class="fas fa-inbox fa-3x mb-3 opacity-50"></i>
                                        <p class="mb-0">Không tìm thấy dữ liệu nào.</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <div class="mt-3 text-end text-muted small">
            Tổng số: <span class="fw-bold" th:text="${customers.size()}">0</span> khách hàng
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
