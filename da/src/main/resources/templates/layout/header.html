<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="header_head">
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .navbar { background: #111 !important; border-bottom: 3px solid #dc3545; }
        .lang-btn { color: white !important; border: 1px solid #444; padding: 2px 10px; border-radius: 15px; font-size: 0.8rem; text-decoration: none; }
        .lang-btn:hover { background: #dc3545; border-color: #dc3545; }
        #trans-loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 3px; background: #dc3545; z-index: 9999; }
    </style>
</head>
<body>
<header th:fragment="header_nav">
    <div id="trans-loading"></div>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="fas fa-bolt text-danger"></i> DuHV6 STORE</a>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Trang chủ</a></li>
                </ul>
                
                <div class="d-flex align-items-center gap-3">
                    <div class="d-flex gap-2 border-end pe-3">
                        <a href="javascript:void(0)" onclick="handleTranslate('vi')" class="lang-btn">VN</a>
                        <a href="javascript:void(0)" onclick="handleTranslate('en')" class="lang-btn">EN</a>
                    </div>
                    <a href="/cart" class="text-white position-relative">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" th:text="${session.cartCount != null ? session.cartCount : '0'}">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <script>
        // Để hàm này ra ngoài để tránh lỗi "not defined"
        async function handleTranslate(lang) {
            const loader = document.getElementById('trans-loading');
            loader.style.display = 'block';
            
            // Chỉ chọn những thẻ chứa text thực sự để dịch
            const elements = document.querySelectorAll('h1, h3, h5, p, .nav-link, .card-title, .card-text');
            
            for (let el of elements) {
                let text = el.innerText.trim();
                if (text.length > 1 && !el.querySelector('i')) {
                    try {
                        const res = await fetch(`/api/translate?text=${encodeURIComponent(text)}&lang=${lang}`);
                        const data = await res.json();
                        if (data.translatedText) el.innerText = data.translatedText;
                    } catch (e) { console.error(e); }
                }
            }
            loader.style.display = 'none';
        }
    </script>
</header>
</body>
</html>
