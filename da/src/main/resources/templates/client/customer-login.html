<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đăng nhập Khách hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5 w-50">
    <h3 class="text-center">Khách hàng Đăng nhập</h3>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${session['success-message']}" class="alert alert-success">
        <span th:text="${session['success-message']}"></span>
        <th:block th:text="${#session.removeAttribute('success-message')}"></th:block>
    </div>
	<form action="/do-login" method="post"> <div th:if="${param.error}" class="alert alert-danger">
	        Sai email hoặc mật khẩu!
	    </div>
	    <div th:if="${param.logout}" class="alert alert-success">
	        Đã đăng xuất thành công.
	    </div>

	    <div class="mb-3">
	        <label>Email:</label>
	        <input type="email" name="username" class="form-control" required>
	    </div>
	    <div class="mb-3">
	        <label>Mật khẩu:</label>
	        <input type="password" name="password" class="form-control" required>
	    </div>
	    
	    <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
		<p class="mt-2 text-center"><a href="/register">Chưa có tài khoản? Đăng ký</a></p>

</div>
</body>
</html>
