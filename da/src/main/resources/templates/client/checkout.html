<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thanh toán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 class="text-center mb-4">Xác nhận đơn hàng</h2>
    
    <div class="row">
        <div class="col-md-7">
            <div class="card p-4">
                <h4>Thông tin giao hàng</h4>
                <form action="/place-order" method="post">
                    <div class="mb-3">
                        <label>Người nhận:</label>
                        <input type="text" class="form-control" th:value="${user.name}" readonly>
                    </div>
                    <div class="mb-3">
                        <label>Số điện thoại:</label>
                        <input type="text" name="phone" class="form-control" th:value="${user.phone}" required>
                    </div>
                    <div class="mb-3">
                        <label>Địa chỉ giao hàng:</label>
                        <textarea name="address" class="form-control" rows="3" required th:text="${user.address}"></textarea>
                    </div>
					<div class="mb-3">
					    <label>Phương thức thanh toán:</label>
					    <select class="form-control" name="paymentMode" id="paymentMode">
					        <option value="COD">Thanh toán khi nhận hàng (COD)</option>
					        <option value="VIETQR">Chuyển khoản VietQR (Ngân hàng)</option>
					      
					    </select>
					</div>
                    
                    <button type="submit" class="btn btn-success w-100 py-2 mt-3 fw-bold">XÁC NHẬN ĐẶT HÀNG</button>
                    <a href="/cart" class="btn btn-outline-secondary w-100 mt-2">Quay lại giỏ hàng</a>
                </form>
            </div>
        </div>

		<div class="col-md-5">
		    <div class="card bg-light p-4">
		        <h4>Đơn hàng của bạn</h4>
		        <hr>
		        <ul class="list-group mb-3">
		            <li class="list-group-item d-flex justify-content-between lh-sm" th:each="item : ${cartItems}">
		                <div th:if="${item.product != null}">
		                    <h6 class="my-0" th:text="${item.product.name}">Tên sản phẩm</h6>
		                    <small class="text-muted">Số lượng: <span th:text="${item.quantity}">0</span></small>
		                </div>
		                
		                <span class="text-muted" 
		                      th:text="${#numbers.formatDecimal(item.quantity * (item.product.discountPrice > 0 ? item.product.discountPrice : item.product.price), 0, 'COMMA', 0, 'POINT')} + ' đ'">
		                    0 đ
		                </span>
		            </li>

		            <li class="list-group-item d-flex justify-content-between bg-white">
		                <span>Tổng cộng (VNĐ)</span>
		                <strong class="text-danger" 
		                        th:text="${#numbers.formatDecimal(grandTotal, 0, 'COMMA', 0, 'POINT')} + ' đ'">
		                    0 đ
		                </strong>
		            </li>
		        </ul>
		    </div>
		</div>
    </div>
</div>
</body>
</html>
