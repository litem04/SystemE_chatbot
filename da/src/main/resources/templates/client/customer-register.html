<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đăng ký thành viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h3 class="text-center">Đăng ký thành viên</h3>

			<div th:if="${failMessage}" class="alert alert-danger text-center">
                <span th:text="${failMessage}"></span>
            </div>

            <div th:if="${successMessage}" class="alert alert-success text-center">
                <span th:text="${successMessage}"></span>
            </div>

            <form action="/register" method="post">
                <div class="mb-3">
                    <label>Họ và tên:</label>
                    <input type="text" name="name" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Email:</label>
                    <input type="email" name="email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Mật khẩu:</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Số điện thoại (Mobile):</label>
                    <input type="text" name="phone" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Giới tính:</label>
                    <select name="gender" class="form-control">
                        <option value="Male">Nam</option>
                        <option value="Female">Nữ</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label>Địa chỉ:</label>
                    <input type="text" name="address" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Mã bưu điện (Pin code):</label>
                    <input type="text" name="pinCode" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-success w-100">Đăng ký ngay</button>
                <br><br>
                <p>Đã có tài khoản? <a href="/login">Đăng nhập tại đây</a></p>
            </form>
        </div>
    </div>
</div>

</body>
</html>
