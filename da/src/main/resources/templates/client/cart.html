<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Giỏ hàng của bạn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">TECHGEAR</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Tiếp tục mua sắm</a></li>
                <li class="nav-item"><a class="nav-link text-warning" href="#">Xin chào, <span th:text="${session.user.name}">User</span></a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="text-center mb-4"><i class="fas fa-shopping-cart"></i> Giỏ hàng của bạn</h2>

    <div th:if="${cartItems.empty}" class="text-center alert alert-warning">
        <p>Giỏ hàng đang trống trơn!</p>
        <a href="/" class="btn btn-primary">Đi mua sắm ngay</a>
    </div>

    <div th:if="${!cartItems.empty}">
        <table class="table table-bordered table-hover align-middle text-center">
            <thead class="table-dark">
            <tr>
                <th>Sản phẩm</th> <th>Đơn giá</th>
                <th>Số lượng</th>
                <th>Thành tiền</th>
                <th>Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${cartItems}">
                <td class="text-start">
                    <span class="fw-bold">Mã SP: <span th:text="${item.productId}"></span></span>
                </td>
                
                <td th:text="${#numbers.formatDecimal(item.discountPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                
				<td style="width: 150px;">
				    <form action="/cart/update" method="post" class="d-flex">
				        <input type="hidden" name="id" th:value="${item.id}">
				        <input type="number" name="quantity" min="1" 
				               class="form-control text-center me-2" 
				               th:value="${item.quantity}">
				        
				        <button type="submit" class="btn btn-sm btn-primary" title="Cập nhật">
				            <i class="fas fa-sync-alt"></i>
				        </button>
				    </form>
				</td>
                
                <td class="fw-bold text-success" 
                    th:text="${#numbers.formatDecimal(item.totalPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                
                <td>
                    <a th:href="@{/cart/remove(id=${item.id})}" class="btn btn-danger btn-sm" 
                       onclick="return confirm('Xóa món này?')">
                        <i class="fas fa-trash"></i> Xóa
                    </a>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="row mt-4">
            <div class="col-md-6 offset-md-6">
                <div class="card bg-light">
                    <div class="card-body">
                        <h4 class="d-flex justify-content-between">
                            <span>Tổng cộng:</span>
                            <span class="text-danger fw-bold" 
                                  th:text="${#numbers.formatDecimal(grandTotal, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">0 đ</span>
                        </h4>
                        <hr>
                        <a href="/checkout" class="btn btn-success w-100 py-2 fs-5">TIẾN HÀNH ĐẶT HÀNG <i class="fas fa-arrow-right"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{layout/footer :: footer_fragment}"></div>

</body>
</html>
